<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOMATO - Order Food Online</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="logo">ZOMATO</div>
        <img src="https://b.zmtcdn.com/web_assets/8313a97515fcb0447d2d77c276532a511583262271.png" alt="Zomato Logo"
            class="logo-image">
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Restaurants</a></li>
                <li><a href="#">Offers</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Login</a></li>
                <li><a href="#">Sign Up</a></li>
            </ul>
        </nav>
    </header>
    <main>

        <section class="hero">
            <h1>Order Food Online from Your Favorite Restaurants</h1>
            <p>Discover the best food in your city and get it delivered to your doorstep.</p>
            <button class="cta-button">Order Now</button>
            <input type="text" placeholder="Search for restaurants or dishes..." class="search-bar">
        </section>
        <script src="js/script.js"></script>
    </main>

    <footer>
        <p>&copy; 2024 ZOMATO. All rights reserved.</p>
    </footer>

</body>

</html>
